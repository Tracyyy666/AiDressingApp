<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能穿搭助手 - 高级定制版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f5eee1; /* 经典奶酪色背景 */
            overflow-x: hidden;
        }

        /* 刻度滑块样式 */
        input[type=range] {
            -webkit-appearance: none;
            background: linear-gradient(to right, #c5a059 0%, #c5a059 var(--percent, 50%), #e5d5bc var(--percent, 50%), #e5d5bc 100%);
            height: 2px;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%;
            background: #c5a059;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* 刻度标记 */
        .ruler-marks {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: linear-gradient(90deg, #c5a059 1px, transparent 1px);
            background-size: 10% 100%;
            opacity: 0.3;
        }

        /* 星光样式：深金色 */
        .star {
            color: #846b3a;
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="star text-4xl top-[5%] left-[10%]">✦</div>
        <div class="star text-3xl top-[15%] left-[40%] opacity-60">✦</div>
        <div class="star text-5xl top-[40%] left-[8%] opacity-40">✦</div>
        <div class="star text-2xl top-[70%] left-[15%]">✦</div>
        <div class="star text-4xl bottom-10 left-[30%] opacity-80">✦</div>
        <div class="star text-5xl top-[8%] right-[15%]">✦</div>
        <div class="star text-3xl top-[45%] right-[10%] opacity-50">✦</div>
        <div class="star text-4xl bottom-20 right-[5%]">✦</div>
        <div class="star text-5xl bottom-[40%] right-[12%] opacity-40">✦</div>
        <div class="star text-2xl top-1/2 left-1/4">✧</div>
        <div class="star text-3xl bottom-1/3 right-1/3 opacity-50">✧</div>
    </div>

    <div class="relative w-full max-w-lg z-10">
        
        <svg class="absolute -left-64 top-1/2 -translate-y-1/2 w-[460px] h-auto opacity-35 text-[#846b3a] pointer-events-none hidden lg:block transform rotate-[-6deg] transition-transform duration-700" viewBox="0 0 200 300" fill="none" stroke="currentColor" stroke-width="0.9">
            <path d="M100 20 L95 25 M100 20 L105 25 M100 20 C100 15 105 10 110 15" />
            <path d="M70 50 C80 45 120 45 130 50 L130 60 C115 75 85 75 70 60 Z" />
            <path d="M70 60 C75 90 85 105 100 105 C115 105 125 90 130 60" />
            <path d="M100 105 C70 120 40 180 20 280 Q100 270 180 280 C160 180 130 120 100 105" />
            <path d="M60 150 Q100 140 140 150" opacity="0.7" />
            <path d="M45 200 Q100 185 155 200" opacity="0.7" />
            <path d="M30 250 Q100 230 170 250" opacity="0.7" />
        </svg>

        <svg class="absolute -right-56 top-1/2 -translate-y-1/2 w-[360px] h-auto opacity-25 text-[#846b3a] pointer-events-none hidden lg:block transform rotate-[5deg] transition-transform duration-700" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.1">
            <path d="M65 30 H135 L145 160 Q100 170 55 160 Z" />
            <path d="M100 30 L85 70 L100 160 L115 70 Z" />
            <path d="M85 70 L65 30 M115 70 L135 30" />
            <path d="M65 30 L40 65 L52 160" />
            <path d="M135 30 L160 65 L148 160" />
            <circle cx="100" cy="100" r="1.5" fill="currentColor" />
            <circle cx="100" cy="130" r="1.5" fill="currentColor" />
        </svg>

        <div class="bg-[#fdfcf7] p-8 md:p-12 rounded-2xl shadow-[0_20px_60px_rgba(74,58,42,0.15)] w-full relative z-20 border border-[#e5d5bc]">
            <div class="absolute top-3 left-3 right-3 bottom-3 border border-[#f0e6d6] pointer-events-none rounded-lg"></div>

            <header class="text-center mb-10">
                <div class="inline-block relative">
                    <span class="absolute -left-10 top-1/2 -translate-y-1/2 text-[#c5a059] text-2xl">✧</span>
                    <h1 class="text-3xl font-bold text-[#4a3a2a] tracking-widest flex items-center justify-center gap-4">
                        AI 智能穿搭助手
                    </h1>
                    <span class="absolute -right-10 top-1/2 -translate-y-1/2 text-[#c5a059] text-2xl">✧</span>
                </div>
                <p class="text-[#8c7a66] text-xs tracking-[0.3em] font-light uppercase mt-4">Personal Stylist Guide</p>
            </header>

            <form id="quizForm" class="space-y-8 px-2">
                <div>
                    <label class="block text-xs font-bold text-[#8c7a66] mb-3 tracking-widest uppercase">身高 (cm): <span id="heightVal" class="text-[#c5a059] text-sm">170</span></label>
                    <div class="relative pt-2">
                        <input type="range" min="140" max="200" value="170" id="height" class="w-full">
                        <div class="ruler-marks pointer-events-none"></div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-[#8c7a66] mb-3 tracking-widest uppercase">体重 (kg)</label>
                    <input type="number" placeholder="例如: 60" id="weight" class="w-full bg-[#fcfaf5] px-4 py-2 border-b border-[#e5d5bc] text-[#4a3a2a] outline-none focus:border-[#c5a059] transition-all">
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-[#8c7a66] tracking-widest uppercase">你的体型</label>
                    <div class="relative">
                        <select id="bodyShape" class="w-full bg-[#fcfaf5] px-4 py-2 border-b border-[#e5d5bc] text-[#4a3a2a] outline-none cursor-pointer appearance-none">
                            <option value="pear">梨型 (上窄下宽)</option>
                            <option value="apple">苹果型 (腰腹丰满)</option>
                            <option value="hourglass">沙漏型 (凹凸有致)</option>
                            <option value="rectangle">矩形 (直线条)</option>
                            <option value="inverted_triangle">倒三角 (肩宽胯窄)</option>
                        </select>
                        <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[#c5a059] pointer-events-none">▾</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-xs font-bold text-[#8c7a66] tracking-widest uppercase">穿搭风格 (可选)</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="cursor-pointer group">
                            <input type="checkbox" name="style" value="casual" class="hidden peer">
                            <span class="px-5 py-1.5 border border-[#e5d5bc] rounded-full text-xs text-[#8c7a66] transition-all peer-checked:bg-[#c5a059] peer-checked:text-white peer-checked:border-[#c5a059]">休闲</span>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="checkbox" name="style" value="work" class="hidden peer">
                            <span class="px-5 py-1.5 border border-[#e5d5bc] rounded-full text-xs text-[#8c7a66] transition-all peer-checked:bg-[#c5a059] peer-checked:text-white peer-checked:border-[#c5a059]">通勤</span>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="checkbox" name="style" value="date" class="hidden peer">
                            <span class="px-5 py-1.5 border border-[#e5d5bc] rounded-full text-xs text-[#8c7a66] transition-all peer-checked:bg-[#c5a059] peer-checked:text-white peer-checked:border-[#c5a059]">约会</span>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="checkbox" name="style" value="vintage" class="hidden peer">
                            <span class="px-5 py-1.5 border border-[#e5d5bc] rounded-full text-xs text-[#8c7a66] transition-all peer-checked:bg-[#c5a059] peer-checked:text-white peer-checked:border-[#c5a059]">复古</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#1a202c] text-[#f5eee1] py-4 rounded-xl font-bold tracking-[0.3em] hover:bg-[#2d3748] transition-all shadow-xl">
                    生成我的专属穿搭
                </button>
            </form>

            <div id="resultCard" class="mt-12 p-8 bg-[#f9f7f2] rounded-xl border border-[#e5d5bc] hidden shadow-inner relative">
                <h3 class="text-sm font-bold text-[#4a3a2a] mb-6 border-b border-[#e5d5bc] pb-2 tracking-[0.2em] flex items-center gap-2">
                    <span class="text-[#c5a059]">✧</span> AI 专属建议
                </h3>
                <div class="space-y-4 text-xs text-[#4a3a2a] leading-relaxed">
                    <p><strong class="text-[#c5a059] mr-2">👕 上装建议:</strong> <span id="resTop"></span></p>
                    <p><strong class="text-[#c5a059] mr-2">👖 下装建议:</strong> <span id="resBottom"></span></p>
                    <p><strong class="text-[#c5a059] mr-2">👟 鞋履搭配:</strong> <span id="resShoes"></span></p>
                    <div class="mt-6 pt-4 border-t border-[#e5d5bc]">
                        <strong class="text-[#c5a059] block mb-2 tracking-widest uppercase">🧠 穿搭逻辑说明：</strong>
                        <p id="resAnalysis" class="italic text-[#8c7a66] leading-loose"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const heightInput = document.getElementById('height');
        const heightVal = document.getElementById('heightVal');

        function updateSlider() {
            const percent = (heightInput.value - heightInput.min) / (heightInput.max - heightInput.min) * 100;
            heightInput.style.setProperty('--percent', `${percent}%`);
            heightVal.innerText = heightInput.value;
        }

        heightInput.oninput = updateSlider;
        updateSlider();

        document.getElementById('quizForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = `
                <div class="flex items-center justify-center gap-3">
                    <div class="relative w-6 h-6 flex items-center justify-center">
                        <div class="absolute inset-0 border-2 border-[#c5a059] border-t-transparent rounded-full animate-spin"></div>
                        <span class="relative text-sm">🚀</span>
                    </div>
                    <span>AI 正在构思中</span>
                    <span class="flex">
                        <span class="animate-bounce" style="animation-delay: 0s">.</span>
                        <span class="animate-bounce" style="animation-delay: 0.2s">.</span>
                        <span class="animate-bounce" style="animation-delay: 0.4s">.</span>
                    </span>
                </div>`;
            btn.disabled = true;

            const height = heightInput.value;
            const weight = document.getElementById('weight').value;
            const bodyShape = document.getElementById('bodyShape').value;
            const styles = Array.from(document.querySelectorAll('input[name="style"]:checked')).map(el => el.value);

            try {
                const response = await fetch('/get_advice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ height: parseInt(height), weight: parseInt(weight), body_shape: bodyShape, styles: styles })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('resTop').innerText = data.advice.top;
                    document.getElementById('resBottom').innerText = data.advice.bottom;
                    document.getElementById('resShoes').innerText = data.advice.shoes;
                    document.getElementById('resAnalysis').innerText = data.advice.analysis;
                    document.getElementById('resultCard').classList.remove('hidden');
                    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
                } else { alert("获取失败：" + data.error); }
            } catch (err) { alert("无法连接服务器，请确认后端已启动"); }
            finally { btn.innerHTML = originalHTML; btn.disabled = false; }
        };
    </script>
</body>
</html>
