<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能穿搭助手 - 高级定制优雅版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #f5eee1;
            overflow-x: hidden;
        }
        input[type=range] {
            -webkit-appearance: none;
            background: linear-gradient(to right, #c5a059 0%, #c5a059 var(--percent), #e5d5bc var(--percent), #e5d5bc 100%);
            height: 2px;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px; width: 18px;
            border-radius: 50%;
            background: #c5a059;
            border: 2px solid #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(197, 160, 89, 0.5);
        }
        .ruler-marks {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background-image: linear-gradient(90deg, #c5a059 1px, transparent 1px);
            background-size: 10px 100%;
            opacity: 0.3;
        }
        .history-panel {
            background: #fcfaf7;
            border: 1px solid #e5d5bc;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1.5rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            border-bottom: 1px solid #f0e6d6;
            padding: 0.8rem 0;
            font-size: 0.85rem;
        }
        .history-btn {
            background: #fcfaf7;
            border: 1px solid #e5d5bc;
            color: #4a3a2a;
            transition: all 0.2s;
        }
        .history-btn:hover {
            background: #c5a059;
            color: white;
            border-color: #c5a059;
        }
        .hidden-history {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <!-- 装饰元素（简化，略） -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0 select-none opacity-20">
        <svg class="absolute -left-10 top-1/4 w-[400px] h-auto text-[#c5a059]" viewBox="0 0 200 300" fill="none" stroke="currentColor" stroke-width="0.5">
            <path d="M100 50 C80 80 40 100 40 150 C40 250 160 250 160 150 C160 100 120 80 100 50 Z" />
            <path d="M100 50 L100 40 M90 45 L110 45" />
            <path d="M60 160 Q100 140 140 160 M50 180 Q100 160 150 180 M45 200 Q100 180 155 200" />
        </svg>
        <svg class="absolute -right-20 top-10 w-[350px] h-auto text-[#c5a059]" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="0.5">
            <path d="M60 40 L140 40 L150 150 L50 150 Z" />
            <path d="M60 40 L40 70 L50 150 M140 40 L160 70 L150 150" />
            <path d="M100 40 L80 80 L100 150 L120 80 Z" />
        </svg>
        <div class="absolute top-1/4 right-1/4 animate-pulse text-[#c5a059]">✦</div>
        <div class="absolute bottom-1/3 left-1/3 animate-pulse text-[#c5a059] delay-700" style="animation-duration: 3s">✦</div>
    </div>

    <div class="bg-[#fdfcf7] p-10 rounded-xl shadow-2xl w-full max-w-lg border border-[#e5d5bc] relative z-10">
        <div class="absolute top-4 left-4 right-4 bottom-4 border border-[#f0e6d6] pointer-events-none rounded-lg"></div>

        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-[#4a3a2a] tracking-widest">AI 智能穿搭助手</h1>
            <div class="w-16 h-px bg-[#c5a059] mx-auto my-3 opacity-30"></div>
            <p class="text-[#8c7a66] text-xs tracking-widest font-light uppercase">Personal Stylist Guide</p>
        </header>

        <form id="quizForm" class="space-y-8 px-2">
            <div>
                <label class="block text-xs font-bold text-[#8c7a66] mb-3">身高 (cm): <span id="heightVal" class="text-[#c5a059]">170</span></label>
                <div class="relative pt-2">
                    <input type="range" min="140" max="200" value="170" id="height" class="w-full">
                    <div class="ruler-marks pointer-events-none"></div>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-[#8c7a66] mb-3">体重 (kg)</label>
                <input type="number" id="weight" placeholder="例如: 60" class="w-full bg-[#fcfaf5] px-4 py-2 border-b border-[#e5d5bc] outline-none focus:border-[#c5a059]">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#8c7a66] mb-3">你的体型</label>
                <select id="bodyShape" class="w-full bg-[#fcfaf5] px-4 py-2 border border-[#e5d5bc] rounded">
                    <option value="pear">梨型 (上窄下宽)</option>
                    <option value="apple">苹果型 (腰腹丰满)</option>
                    <option value="hourglass">沙漏型 (凹凸有致)</option>
                    <option value="rectangle">矩形 (直线条)</option>
                    <option value="inverted_triangle">倒三角 (肩宽胯窄)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-[#8c7a66] mb-3">穿搭风格 (可选)</label>
                <div class="flex flex-wrap gap-3">
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="休闲" class="hidden peer">
                        <span class="px-5 py-1.5 border rounded-full text-xs cursor-pointer peer-checked:bg-[#c5a059] peer-checked:text-white">休闲</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="职场" class="hidden peer">
                        <span class="px-5 py-1.5 border rounded-full text-xs cursor-pointer peer-checked:bg-[#c5a059] peer-checked:text-white">通勤</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="约会" class="hidden peer">
                        <span class="px-5 py-1.5 border rounded-full text-xs cursor-pointer peer-checked:bg-[#c5a059] peer-checked:text-white">约会</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="复古" class="hidden peer">
                        <span class="px-5 py-1.5 border rounded-full text-xs cursor-pointer peer-checked:bg-[#c5a059] peer-checked:text-white">复古</span>
                    </label>
                </div>
            </div>
            <button type="submit" class="w-full bg-[#1a202c] text-[#f5eee1] py-4 rounded-sm font-bold tracking-[0.2em] hover:bg-[#2d3748] transition-all">
                生成我的专属穿搭
            </button>
        </form>

        <div id="resultCard" class="mt-10 p-8 bg-[#fcfaf5] rounded-sm border border-[#e5d5bc] hidden">
            <h3 class="text-sm font-bold text-[#4a3a2a] mb-4 border-b pb-2">✦ AI 专属穿搭建议</h3>
            <div class="grid gap-4 text-xs">
                <p><strong class="text-[#c5a059]">👕 上装:</strong> <span id="resTop"></span></p>
                <p><strong class="text-[#c5a059]">👖 下装:</strong> <span id="resBottom"></span></p>
                <p><strong class="text-[#c5a059]">👟 鞋履:</strong> <span id="resShoes"></span></p>
                <div class="pt-2"><strong class="text-[#c5a059]">🧠 理由:</strong> <span id="resAnalysis" class="italic"></span></div>
            </div>
        </div>

        <div class="mt-6">
            <button id="historyBtn" class="history-btn w-full py-2 text-sm tracking-wider rounded-sm">📜 历史搭配记录</button>
            <div id="historyPanel" class="history-panel hidden-history">
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 后端基础地址（可自行改为你的实际 IP:端口）
            const API_BASE = 'http://127.0.0.1:5000';

            // DOM
            const heightInput = document.getElementById('height');
            const heightVal = document.getElementById('heightVal');
            const weightInput = document.getElementById('weight');
            const bodyShapeSelect = document.getElementById('bodyShape');
            const styleChecks = document.querySelectorAll('input[name="style"]');
            const form = document.getElementById('quizForm');
            const resultCard = document.getElementById('resultCard');
            const resTop = document.getElementById('resTop');
            const resBottom = document.getElementById('resBottom');
            const resShoes = document.getElementById('resShoes');
            const resAnalysis = document.getElementById('resAnalysis');
            const historyBtn = document.getElementById('historyBtn');
            const historyPanel = document.getElementById('historyPanel');
            const historyListDiv = document.getElementById('historyList');

            // 滑块
            function setPercent() {
                const val = heightInput.value;
                const percent = (val - 140) / 60 * 100;
                heightInput.style.setProperty('--percent', `${percent}%`);
                heightVal.innerText = val;
            }
            heightInput.addEventListener('input', setPercent);
            setPercent();

            function getSelectedStyles() {
                const selected = [];
                styleChecks.forEach(cb => { if (cb.checked) selected.push(cb.value); });
                return selected;
            }

            async function saveHistory(userData, outfit) {
                const payload = {
                    user_id: "default",
                    height: userData.height,
                    weight: userData.weight,
                    bodyShape: userData.bodyShape,
                    styles: userData.styles,
                    top: outfit.top,
                    bottom: outfit.bottom,
                    shoes: outfit.shoes,
                    reason: outfit.reason
                };
                try {
                    await fetch(`${API_BASE}/save_history`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch (err) { console.warn("保存历史失败", err); }
            }

            async function loadHistory() {
                try {
                    const resp = await fetch(`${API_BASE}/get_history?user_id=default`);
                    const records = await resp.json();
                    if (!records || records.length === 0) {
                        historyListDiv.innerHTML = '<div class="text-center text-[#8c7a66] py-4">暂无历史搭配记录</div>';
                        return;
                    }
                    let html = '';
                    records.forEach(rec => {
                        const timestamp = new Date(rec.timestamp).toLocaleString();
                        const stylesStr = (rec.styles || []).join('、');
                        html += `
                            <div class="history-item">
                                <small>📅 ${timestamp}</small><br>
                                <strong>📏 ${rec.height}cm / ⚖️ ${rec.weight}kg / ${rec.bodyShape}</strong><br>
                                🎨 风格：${stylesStr}<br>
                                🧥 上衣：${rec.top} &nbsp;|&nbsp; 👖 下装：${rec.bottom} &nbsp;|&nbsp; 👟 鞋子：${rec.shoes}<br>
                                💬 ${rec.reason}
                            </div>
                        `;
                    });
                    historyListDiv.innerHTML = html;
                } catch (err) {
                    console.error(err);
                    historyListDiv.innerHTML = '<div class="text-center text-red-500 py-4">加载失败，请确保后端已启动</div>';
                }
            }

            historyBtn.addEventListener('click', async () => {
                const isHidden = historyPanel.classList.contains('hidden-history');
                if (isHidden) {
                    await loadHistory();
                    historyPanel.classList.remove('hidden-history');
                    historyBtn.textContent = '📜 隐藏历史记录';
                } else {
                    historyPanel.classList.add('hidden-history');
                    historyBtn.textContent = '📜 历史搭配记录';
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const height = parseInt(heightInput.value);
                const weight = parseFloat(weightInput.value);
                if (!weight || weight <= 0) return alert("请填写体重");
                const bodyShape = bodyShapeSelect.value;
                const styles = getSelectedStyles();
                if (styles.length === 0) return alert("请至少选择一种风格");

                const submitBtn = form.querySelector('button');
                const originalText = submitBtn.innerText;
                submitBtn.innerText = "🤔 AI 思考中...";
                submitBtn.disabled = true;

                try {
                    const response = await fetch(`${API_BASE}/recommend`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ height, weight, bodyShape, styles })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    resTop.innerText = data.top;
                    resBottom.innerText = data.bottom;
                    resShoes.innerText = data.shoes;
                    resAnalysis.innerText = data.reason;
                    resultCard.classList.remove('hidden');
                    resultCard.scrollIntoView({ behavior: 'smooth' });
                    await saveHistory({ height, weight, bodyShape, styles }, data);
                    if (!historyPanel.classList.contains('hidden-history')) await loadHistory();
                } catch (err) {
                    alert("推荐失败：" + err.message);
                } finally {
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
