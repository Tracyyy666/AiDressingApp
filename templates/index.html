<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 穿搭助手 - 问卷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滑块样式 */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #4F46E5;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <!-- 标题 -->
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">👗 AI 智能穿搭助手</h1>
            <p class="text-gray-500 text-sm mt-2">输入你的数据，获取专业搭配建议</p>
        </header>

        <form id="quizForm" class="space-y-6">
            <!-- 身高滑块 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    身高 (cm): <span id="heightVal" class="text-indigo-600 font-bold">170</span>
                </label>
                <input type="range" min="140" max="200" value="170" id="height" 
                       class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>

            <!-- 体重输入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">体重 (kg)</label>
                <input type="number" placeholder="例如: 60" id="weight"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <!-- 体型下拉菜单 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">你的体型</label>
                <select id="bodyShape" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="pear">梨型 (上窄下宽)</option>
                    <option value="apple">苹果型 (腰腹丰满)</option>
                    <option value="hourglass">沙漏型 (凹凸有致)</option>
                    <option value="rectangle">矩形 (直线条)</option>
                    <option value="inverted_triangle">倒三角 (肩宽胯窄)</option>
                </select>
            </div>

            <!-- 风格复选框 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">偏好风格 (可多选)</label>
                <div class="flex flex-wrap gap-2">
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="casual" class="hidden peer">
                        <span class="px-4 py-1 border border-gray-300 rounded-full text-sm cursor-pointer peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600">休闲</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="work" class="hidden peer">
                        <span class="px-4 py-1 border border-gray-300 rounded-full text-sm cursor-pointer peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600">职场</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="date" class="hidden peer">
                        <span class="px-4 py-1 border border-gray-300 rounded-full text-sm cursor-pointer peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600">约会</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="checkbox" name="style" value="vintage" class="hidden peer">
                        <span class="px-4 py-1 border border-gray-300 rounded-full text-sm cursor-pointer peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600">复古</span>
                    </label>
                </div>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition duration-200">
                ✨ 生成我的专属穿搭
            </button>
        </form><div id="resultCard" class="mt-8 p-6 bg-indigo-50 rounded-xl border border-indigo-100 hidden">
            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                ✨ AI 专属穿搭建议
            </h3>
            <div class="space-y-4 text-sm text-gray-700">
                <div><strong>👕 上装建议：</strong> <span id="resTop"></span></div>
                <div><strong>👖 下装建议：</strong> <span id="resBottom"></span></div>
                <div><strong>👟 鞋履搭配：</strong> <span id="resShoes"></span></div>
                <div class="pt-2 border-t border-indigo-200">
                    <strong>🧠 穿搭逻辑：</strong> <p id="resAnalysis" class="mt-1 text-xs italic text-gray-600"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 滑块数值实时显示 ---
        const heightInput = document.getElementById('height');
        const heightVal = document.getElementById('heightVal');
        if (heightInput && heightVal) {
            heightInput.oninput = function() {
                heightVal.innerText = this.value;
            };
        }

        // --- 表单提交与 AI 交互逻辑 ---
        const quizForm = document.getElementById('quizForm');
        if (quizForm) {
            quizForm.onsubmit = async function(e) {
                e.preventDefault();
                
                // 收集数据
                const height = document.getElementById('height').value;
                const weight = document.getElementById('weight').value;
                const bodyShape = document.getElementById('bodyShape').value;
                const styleElements = document.querySelectorAll('input[name="style"]:checked');
                const styles = Array.from(styleElements).map(el => el.value);

                // 改变按钮状态
                const btn = e.target.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = "🚀 AI 正在构思中...";
                btn.disabled = true;

                try {
                    // 发送异步请求给后端
                    const response = await fetch('/get_advice', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            height: parseInt(height), 
                            weight: parseInt(weight), 
                            body_shape: bodyShape, 
                            styles: styles 
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        // 渲染结果
                        document.getElementById('resTop').innerText = data.advice.top;
                        document.getElementById('resBottom').innerText = data.advice.bottom;
                        document.getElementById('resShoes').innerText = data.advice.shoes;
                        document.getElementById('resAnalysis').innerText = data.advice.analysis;
                        
                        // 显示卡片
                        const resultCard = document.getElementById('resultCard');
                        resultCard.classList.remove('hidden');
                        resultCard.scrollIntoView({ behavior: 'smooth' });
                    } else {
                        alert("AI 获取失败：" + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert("连接后端失败，请确认 python app.py 是否在运行？");
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>
