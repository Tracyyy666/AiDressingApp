<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 穿搭灵魂助手 - 最终形态</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #f5eee1; background-image: radial-gradient(#d4c4a8 0.5px, transparent 0.5px); background-size: 30px 30px; }
        
        /* 身高滑块自定义 */
        input[type=range] { -webkit-appearance: none; background: linear-gradient(to right, #c5a059 0%, #c5a059 var(--percent, 50%), #e5d5bc var(--percent, 50%), #e5d5bc 100%); height: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #c5a059; border: 2px solid #ffffff; cursor: pointer; }
        .ruler-marks { position: absolute; bottom: -8px; left: 0; width: 100%; height: 8px; background-image: linear-gradient(90deg, #c5a059 1.5px, transparent 1.5px); background-size: 10% 100%; opacity: 0.3; }

        /* 智能体重框：支持滚动与输入 */
        .weight-box { background: #fcfaf5; border: 1px solid #e5d5bc; border-radius: 12px; height: 56px; display: flex; align-items: center; justify-content: center; position: relative; transition: border-color 0.3s; }
        .weight-box:hover { border-color: #c5a059; }
        .weight-input { background: transparent; border: none; text-align: center; font-size: 1.5rem; color: #c5a059; font-weight: bold; width: 100%; outline: none; cursor: ns-resize; }
        .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* 性别动态切换开关 */
        .gender-toggle { position: relative; width: 140px; height: 40px; background: #fcfaf5; border: 1px solid #e5d5bc; border-radius: 20px; display: flex; cursor: pointer; padding: 2px; }
        .gender-knob { position: absolute; width: 68px; height: 34px; background: #c5a059; border-radius: 17px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .gender-label { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; z-index: 10; transition: color 0.3s; }

        .star { color: #846b3a; position: absolute; pointer-events: none; z-index: 0; }
        .tag-bubble { background: #ebd3a6; color: #4a3a2a; padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: bold; }
        
        /* 季节按钮样式 */
        .season-btn { transition: all 0.2s; cursor: pointer; }
        .season-btn.active { background-color: #c5a059 !important; color: white !important; border-color: #c5a059 !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="star text-5xl top-[5%] left-[10%] animate-pulse">✦</div>
        <div class="star text-4xl bottom-20 right-[5%] animate-pulse">✦</div>
        <div class="star text-3xl top-[35%] right-[28%] opacity-40">✧</div>
    </div>

    <div class="relative w-full max-w-lg z-10">
        <svg class="absolute -left-64 top-1/2 -translate-y-1/2 w-[480px] h-auto opacity-30 text-[#846b3a] pointer-events-none hidden lg:block transform rotate-[-8deg]" viewBox="0 0 200 300" fill="none" stroke="currentColor" stroke-width="0.8">
            <path d="M100 15 L95 20 M100 15 L105 20 M100 15 C100 10 105 5 110 10 M65 45 C75 40 125 40 135 45 L135 55 C120 70 80 70 65 55 Z M65 55 C70 85 85 105 100 105 C115 105 130 85 135 55" />
            <path d="M100 105 C80 120 50 170 30 285 Q100 270 170 285 C150 170 120 120 100 105" />
        </svg>
        <svg class="absolute -right-56 top-1/2 -translate-y-1/2 w-[380px] h-auto opacity-20 text-[#846b3a] pointer-events-none hidden lg:block transform rotate-[6deg]" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.0">
            <path d="M65 25 H135 L145 165 Q100 175 45 165 Z M100 25 L82 75 L100 165 L118 75 Z" />
            <circle cx="100" cy="105" r="1.5" fill="currentColor" />
        </svg>

        <div class="bg-[#fdfcf7] p-8 md:p-10 rounded-2xl shadow-2xl w-full relative z-20 border border-[#e5d5bc]">
            <div class="absolute top-3 left-3 right-3 bottom-3 border border-[#f0e6d6] pointer-events-none rounded-lg"></div>

            <header class="text-center mb-8">
                <h1 class="text-2xl font-bold text-[#4a3a2a] tracking-widest flex items-center justify-center gap-3">
                    <span class="text-[#c5a059]">✧</span> AI 穿搭灵魂助手 <span class="text-[#c5a059]">✧</span>
                </h1>
            </header>

            <form id="quizForm" class="space-y-6 px-2">
                <!-- 性别切换 -->
                <div class="flex items-center justify-center gap-4">
                    <div class="gender-toggle" id="genderSwitch">
                        <div class="gender-knob" id="genderKnob"></div>
                        <div class="gender-label text-white" id="femaleLabel">女性</div>
                        <div class="gender-label text-[#8c7a66]" id="maleLabel">男性</div>
                    </div>
                    <input type="hidden" id="genderInput" name="gender" value="女性">
                </div>

                <!-- 身高 -->
                <div>
                    <label class="block text-xs font-bold text-[#8c7a66] mb-4 uppercase text-center">身高: <span id="heightVal" class="text-[#c5a059]">170</span> cm</label>
                    <div class="relative pt-2">
                        <input type="range" min="140" max="200" value="170" id="height" class="w-full">
                        <div class="ruler-marks pointer-events-none"></div>
                    </div>
                </div>

                <!-- 体重 -->
                <div>
                    <label class="block text-xs font-bold text-[#8c7a66] mb-2 uppercase text-center">体重 (kg)</label>
                    <div class="weight-box">
                        <input type="number" id="weight" value="60" class="weight-input" title="滚动鼠标加减 / 点击手动输入">
                    </div>
                </div>

                <!-- 体型 -->
                <select id="bodyShape" class="w-full bg-[#fcfaf5] border-b border-[#e5d5bc] text-sm py-2 px-2 outline-none">
                    <option value="pear">梨型 (上窄下宽)</option>
                    <option value="apple">苹果型 (腰腹丰满)</option>
                    <option value="hourglass">沙漏型 (凹凸有致)</option>
                    <option value="rectangle">矩形 (直线条)</option>
                    <option value="inverted_triangle">倒三角 (肩宽胯窄)</option>
                    <option value="unknown">暂不提供 (由 AI 分析)</option>
                </select>

                <!-- 季节选择（新增） -->
                <div>
                    <label class="block text-xs font-bold text-[#8c7a66] mb-2 uppercase text-center">当前季节</label>
                    <div class="flex justify-center gap-3">
                        <button type="button" data-season="春" class="season-btn px-4 py-1 border border-[#e5d5bc] rounded-full text-xs hover:bg-[#c5a059] hover:text-white transition-all">春</button>
                        <button type="button" data-season="夏" class="season-btn px-4 py-1 border border-[#e5d5bc] rounded-full text-xs active bg-[#c5a059] text-white">夏</button>
                        <button type="button" data-season="秋" class="season-btn px-4 py-1 border border-[#e5d5bc] rounded-full text-xs hover:bg-[#c5a059] hover:text-white transition-all">秋</button>
                        <button type="button" data-season="冬" class="season-btn px-4 py-1 border border-[#e5d5bc] rounded-full text-xs hover:bg-[#c5a059] hover:text-white transition-all">冬</button>
                    </div>
                    <input type="hidden" id="seasonInput" name="season" value="夏">
                </div>

                <!-- 照片上传 -->
                <label class="flex items-center justify-center gap-2 bg-[#fcfaf5] border-2 border-dashed border-[#e5d5bc] p-3 rounded-lg cursor-pointer hover:border-[#c5a059] transition-all">
                    <span id="fileName" class="text-xs text-[#8c7a66]">📸 上传照片，获取精准配色建议</span>
                    <input type="file" id="photo" class="hidden" accept="image/*">
                </label>

                <!-- 风格选择 -->
                <div class="space-y-3">
                    <div class="flex flex-wrap justify-center gap-2">
                        <label class="cursor-pointer"><input type="radio" name="style" value="休闲" class="hidden peer" checked><span class="px-3 py-1.5 border border-[#e5d5bc] rounded-full text-xs peer-checked:bg-[#c5a059] peer-checked:text-white transition-all">休闲</span></label>
                        <label class="cursor-pointer"><input type="radio" name="style" value="通勤" class="hidden peer"><span class="px-3 py-1.5 border border-[#e5d5bc] rounded-full text-xs peer-checked:bg-[#c5a059] peer-checked:text-white transition-all">通勤</span></label>
                        <label class="cursor-pointer"><input type="radio" name="style" value="复古" class="hidden peer"><span class="px-3 py-1.5 border border-[#e5d5bc] rounded-full text-xs peer-checked:bg-[#c5a059] peer-checked:text-white transition-all">复古</span></label>
                        <label class="cursor-pointer"><input type="radio" name="style" value="other" class="hidden peer" id="otherStyleRadio"><span class="px-3 py-1.5 border border-[#e5d5bc] rounded-full text-xs peer-checked:bg-[#c5a059] peer-checked:text-white transition-all">其他</span></label>
                    </div>
                    <input type="text" id="customStyleInput" placeholder="请输入自定义风格" class="w-full hidden bg-[#fcfaf5] border-b border-[#c5a059] text-xs py-2 px-2 outline-none text-center">
                </div>

                <button type="submit" class="w-full bg-[#1a202c] text-white py-4 rounded-xl font-bold tracking-widest hover:opacity-90 shadow-xl transition-all">
                    🚀 生成我的专属穿搭
                </button>
            </form>

            <div id="resultCard" class="mt-12 p-8 bg-[#f9f7f2] rounded-xl border border-[#e5d5bc] hidden shadow-inner">
                <div id="tagArea" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="space-y-5 text-xs leading-loose text-[#4a3a2a]">
                    <p><strong class="text-[#c5a059] mr-2">👕 上装建议:</strong> <span id="resTop"></span></p>
                    <p><strong class="text-[#c5a059] mr-2">👖 下装建议:</strong> <span id="resBottom"></span></p>
                    <p><strong class="text-[#c5a059] mr-2">👟 鞋履建议:</strong> <span id="resShoes"></span></p>
                    <div class="mt-6 pt-4 border-t border-[#e5d5bc] italic text-[#8c7a66]" id="resAnalysis"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 性别切换动画
        const genderSwitch = document.getElementById('genderSwitch');
        const genderKnob = document.getElementById('genderKnob');
        const genderInput = document.getElementById('genderInput');
        const femaleLabel = document.getElementById('femaleLabel');
        const maleLabel = document.getElementById('maleLabel');

        genderSwitch.onclick = () => {
            const isFemale = genderInput.value === '女性';
            genderInput.value = isFemale ? '男性' : '女性';
            genderKnob.style.transform = isFemale ? 'translateX(66px)' : 'translateX(0)';
            femaleLabel.style.color = isFemale ? '#8c7a66' : '#ffffff';
            maleLabel.style.color = isFemale ? '#ffffff' : '#8c7a66';
        };

        // 体重框：滚动加减逻辑
        const wInput = document.getElementById('weight');
        wInput.addEventListener('wheel', (e) => {
            e.preventDefault();
            const step = e.deltaY < 0 ? 1 : -1;
            wInput.value = parseInt(wInput.value || 60) + step;
        });

        // 身高滑块同步
        const hInput = document.getElementById('height');
        hInput.oninput = () => {
            hInput.style.setProperty('--percent', `${(hInput.value - 140) / 60 * 100}%`);
            document.getElementById('heightVal').innerText = hInput.value;
        };
        hInput.dispatchEvent(new Event('input'));

        // 季节选择交互（新增）
        const seasonBtns = document.querySelectorAll('.season-btn');
        const seasonInput = document.getElementById('seasonInput');
        seasonBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                seasonBtns.forEach(b => b.classList.remove('active', 'bg-[#c5a059]', 'text-white'));
                btn.classList.add('active', 'bg-[#c5a059]', 'text-white');
                seasonInput.value = btn.getAttribute('data-season');
            });
        });

        // 风格选项联动
        const otherRadio = document.getElementById('otherStyleRadio');
        const customInput = document.getElementById('customStyleInput');
        document.querySelectorAll('input[name="style"]').forEach(r => {
            r.addEventListener('change', () => customInput.classList.toggle('hidden', r.value !== 'other'));
        });

        // 照片上传提示
        document.getElementById('photo').onchange = function() {
            document.getElementById('fileName').innerText = "已选择照片: " + this.files[0].name;
        };

        // 表单提交
        document.getElementById('quizForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = "👗 正在注入时尚灵魂...";

            const formData = new FormData();
            formData.append('height', hInput.value);
            formData.append('weight', wInput.value);
            formData.append('gender', genderInput.value);
            formData.append('body_shape', document.getElementById('bodyShape').value);
            formData.append('season', seasonInput.value);   // 添加季节
            const selectedStyle = document.querySelector('input[name="style"]:checked');
            let styleValue = selectedStyle.value;
            if (styleValue === 'other') {
                styleValue = customInput.value.trim();
                if (!styleValue) {
                    alert("请输入自定义风格");
                    btn.disabled = false;
                    btn.innerText = "🚀 生成我的专属穿搭";
                    return;
                }
            }
            formData.append('style', styleValue);
            
            const photo = document.getElementById('photo').files[0];
            if(photo) formData.append('photo', photo);

            try {
                const res = await fetch('/get_advice', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.success) {
                    const advice = data.advice;
                    document.getElementById('resTop').innerText = advice.top;
                    document.getElementById('resBottom').innerText = advice.bottom;
                    document.getElementById('resShoes').innerText = advice.shoes;
                    document.getElementById('resAnalysis').innerText = "🧠 AI 搭配哲学: " + advice.analysis;
                    document.getElementById('tagArea').innerHTML = (advice.style_tags || []).map(t => `<span class="tag-bubble"># ${t}</span>`).join('');
                    document.getElementById('resultCard').classList.remove('hidden');
                    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("生成失败：" + (data.error || "未知错误"));
                }
            } catch(e) { 
                alert("AI 服务连接超时，请检查后端运行状态"); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = "🚀 生成我的专属穿搭"; 
            }
        };
    </script>
</body>
</html>
